<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>PWU CDCEC | Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f2f5; 
            -webkit-tap-highlight-color: transparent;
        }
        .bg-pw-maroon { background-color: #800000; }
        .text-pw-maroon { color: #800000; }
        .border-pw-maroon { border-color: #800000; }
        
        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            background-color: #ffffff; 
            min-height: 100vh; 
            position: relative; 
            box-shadow: 0 0 30px rgba(0,0,0,0.08); 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            max-width: 90%;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            text-align: center;
        }
        .toast.error { background: #dc2626; border: 1px solid #b91c1c; }
        .toast.success { background: #16a34a; border: 1px solid #15803d; }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .modal-overlay {
            animation: fadeIn 0.25s ease-out forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .modal-content {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .badge-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>
    
    <div id="app" class="app-container">
        <div class="flex items-center justify-center h-screen">
            <div class="spinner" style="border-color: #800000; border-top-color: transparent;"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // API CONFIGURATION
        // ============================================================
        const API_BASE_URL = 'https://classroom-ten-zeta.vercel.app/api/classroom';

        // ============================================================
        // API HELPERS
        // ============================================================
        async function apiCall(endpoint, options = {}) {
            const url = `${API_BASE_URL}${endpoint}`;
            const res = await fetch(url, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers },
                body: options.body ? JSON.stringify(options.body) : undefined,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        // ============================================================
        // STATE
        // ============================================================
        let state = {
            user: null,
            users: [],
            announcements: [],
            activeCategory: 'All',
            expandedPosts: [],
            uploadModalId: null,
            tempImage: null,
            imagePreviewId: null,
            view: 'dashboard',
            editingProfile: false,
            loading: false,
            toastTimer: null,
            showNotifications: false,
            showLogoutModal: false,
        };

        // ============================================================
        // SESSION CHECK
        // ============================================================
        function checkSession() {
            const userJson = sessionStorage.getItem('user');
            if (!userJson) {
                window.location.href = '/';
                return null;
            }
            try {
                const user = JSON.parse(userJson);
                if (user.role === 'teacher' || user.role === 'president') {
                    window.location.href = '/teacher.html';
                    return null;
                }
                return user;
            } catch (_) {
                sessionStorage.removeItem('user');
                window.location.href = '/';
                return null;
            }
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            clearTimeout(state.toastTimer);
            state.toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }

        // ============================================================
        // LOAD DATA
        // ============================================================
        async function loadData() {
            try {
                const [users, announcements] = await Promise.all([
                    apiCall('/users'),
                    apiCall('/announcements'),
                ]);
                state.users = users;
                state.announcements = announcements;
            } catch (e) {
                showToast('Failed to load data: ' + e.message, 'error');
            }
        }

        // ============================================================
        // RENDER (Keep your existing render functions)
        // ============================================================
        function render() {
            const app = document.getElementById('app');
            
            if (!state.user) {
                const user = checkSession();
                if (!user) return;
                state.user = user;
            }

            let mainContent = '';
            if (state.view === 'dashboard') mainContent = renderDashboard();
            else if (state.view === 'profile') mainContent = renderProfile();

            app.innerHTML = `
                <div class="flex flex-col h-screen" onclick="closeDropdowns(event)">
                    ${renderHeader()}
                    <div id="main-scroll-area" class="flex-1 overflow-y-auto pb-24 no-scrollbar bg-gray-50">${mainContent}</div>
                    ${renderBottomNav()}
                </div>
                ${state.uploadModalId ? renderUploadModal() : ''}
                ${state.imagePreviewId ? renderImagePreview() : ''}
                ${state.showLogoutModal ? renderLogoutModal() : ''}
                ${state.loading ? renderLoading() : ''}
            `;
        }

        // ============================================================
        // RENDER: Header
        // ============================================================
        function renderHeader() {
            const unreadCount = getUnreadEvents().length;
            return `
                <header class="bg-pw-maroon text-white sticky top-0 z-20 px-4 py-3.5 flex items-center justify-between shadow-md">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-white text-pw-maroon rounded-full flex items-center justify-center font-black text-xs mr-3 shadow-sm border-2 border-pw-maroon">PWU</div>
                        <div>
                            <h1 class="text-[14px] font-black uppercase tracking-wide leading-tight">PWU CDCEC</h1>
                            <p class="text-[10px] text-white/80 font-semibold tracking-wider uppercase">Student Portal</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button id="noti-btn" onclick="toggleNotifications()" class="relative hover:text-gray-200">
                            <i class="fas fa-bell text-[20px]"></i>
                            ${unreadCount > 0 ? `<span class="absolute -top-1 -right-1 bg-white text-pw-maroon text-[10px] font-black rounded-full w-4 h-4 flex items-center justify-center shadow-md badge-pulse">${unreadCount}</span>` : ''}
                        </button>
                        <button onclick="state.showLogoutModal=true; render();" class="hover:text-gray-200"><i class="fas fa-sign-out-alt text-[20px]"></i></button>
                    </div>
                    ${state.showNotifications ? renderNotificationsDropdown() : ''}
                </header>
            `;
        }

        // ============================================================
        // RENDER: Notifications Dropdown
        // ============================================================
        function renderNotificationsDropdown() {
            const unread = getUnreadEvents();
            return `
                <div id="noti-drop" class="absolute top-16 right-4 w-64 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 overflow-hidden">
                    <div class="bg-pw-maroon px-4 py-2 flex justify-between items-center text-white">
                        <span class="text-[11px] font-bold uppercase tracking-widest">Alerts</span>
                        <span class="bg-white text-pw-maroon text-[9px] px-2 py-0.5 rounded-md font-bold shadow-sm">${unread.length} New</span>
                    </div>
                    <div class="max-h-64 overflow-y-auto no-scrollbar bg-gray-50">
                        ${unread.length ? unread.map(a => `
                            <div onclick="state.showNotifications=false; state.activeCategory='${a.category}'; changeView('dashboard');" class="p-3 border-b border-gray-200 cursor-pointer hover:bg-red-50 flex gap-3 items-start">
                                <div class="w-2 h-2 mt-1.5 rounded-full bg-pw-maroon shadow-sm shadow-pw-maroon/50"></div>
                                <div>
                                    <div class="text-[9px] text-pw-maroon font-bold mb-0.5 uppercase tracking-wide">${a.category}</div>
                                    <div class="text-[11px] text-gray-800 font-semibold line-clamp-2">${a.title}</div>
                                </div>
                            </div>
                        `).join('') : `
                            <div class="p-6 text-center flex flex-col items-center bg-white">
                                <i class="fas fa-check-circle text-2xl text-green-500 mb-2"></i>
                                <span class="text-[11px] font-bold text-gray-700">You're all caught up!</span>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER: Bottom Nav
        // ============================================================
        function renderBottomNav() {
            return `
                <nav class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-200 px-2 py-2 flex justify-between items-center shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-10 pb-safe">
                    <button onclick="changeView('dashboard')" class="flex flex-col items-center p-2 flex-1 ${state.view === 'dashboard' ? 'text-pw-maroon' : 'text-gray-400 hover:text-gray-600'}">
                        <i class="fas fa-layer-group text-[22px] mb-1"></i>
                        <span class="text-[10px] font-bold tracking-wide">Feed</span>
                    </button>
                    <button onclick="changeView('profile')" class="flex flex-col items-center p-2 flex-1 ${state.view === 'profile' ? 'text-pw-maroon' : 'text-gray-400 hover:text-gray-600'}">
                        <i class="fas fa-user-circle text-[22px] mb-1"></i>
                        <span class="text-[10px] font-bold tracking-wide">Profile</span>
                    </button>
                </nav>
            `;
        }

        // ============================================================
        // RENDER: Dashboard
        // ============================================================
        function renderDashboard() {
            const categories = ['All', 'Classroom', 'Deadlines', 'Events', 'Exam', 'Announcement'];
            const firstName = state.user.name.split(',')[1].trim().split(' ')[0];
            const announcements = state.announcements;

            return `
                <div class="pb-4">
                    <div class="bg-pw-maroon text-white px-5 pt-4 pb-8 rounded-b-[2rem] shadow-md mb-2 relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 text-white/10 text-[120px]"><i class="fas fa-user-graduate"></i></div>
                        <div class="relative z-10">
                            <h2 class="text-xl font-black tracking-wide">Hello, ${firstName}!</h2>
                            <p class="text-[11px] text-white/90 font-medium mt-1">Here is your academic overview.</p>
                        </div>
                    </div>

                    <div class="px-4 -mt-6 relative z-10">
                        ${renderMetrics()}

                        <div class="flex gap-2 mb-5 overflow-x-auto no-scrollbar pb-2 pt-1">
                            ${categories.map(c => `
                                <button onclick="state.activeCategory='${c}'; render()" class="whitespace-nowrap px-5 py-2.5 text-[11px] font-bold rounded-full border-2 ${state.activeCategory === c ? 'bg-pw-maroon text-white border-pw-maroon shadow-md' : 'bg-white text-gray-600 border-gray-200 hover:border-pw-maroon hover:text-pw-maroon'}">${c}</button>
                            `).join('')}
                        </div>

                        <div class="space-y-4">
                            ${announcements.filter(a => state.activeCategory === 'All' || a.category === state.activeCategory).map(a => renderAnnouncement(a)).join('')}
                            ${announcements.length === 0 ? '<div class="text-center p-12 bg-white rounded-2xl border border-gray-200 shadow-sm"><i class="fas fa-folder-open text-4xl text-gray-300 mb-4 block"></i><p class="text-sm text-gray-500 font-bold">No announcements yet.</p></div>' : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER: Metrics
        // ============================================================
        function renderMetrics() {
            const announcements = state.announcements;
            const activePosts = announcements.length;
            const myUnread = getUnreadEvents().length;
            let myAcks = 0;
            announcements.forEach(a => { if (a.acknowledgements.includes(state.user.name)) myAcks++; });
            const readPercent = activePosts === 0 ? 100 : Math.round((myAcks / activePosts) * 100);

            let achievementLevel = 'Beginner';
            let achievementColor = 'text-gray-500';
            if (readPercent >= 80 && activePosts >= 3) {
                achievementLevel = '🏆 Scholar';
                achievementColor = 'text-yellow-600';
            } else if (readPercent >= 50) {
                achievementLevel = '📚 Learner';
                achievementColor = 'text-blue-600';
            } else if (readPercent >= 20) {
                achievementLevel = '📖 Reader';
                achievementColor = 'text-green-600';
            }

            return `
                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 mb-5">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <h3 class="text-[12px] font-black text-gray-800 uppercase tracking-wide">Your Engagement</h3>
                            <p class="text-[10px] text-gray-500 font-bold mt-0.5">Read ${myAcks} of ${activePosts} posts</p>
                        </div>
                        <div class="text-[14px] font-black ${readPercent === 100 ? 'text-green-600' : 'text-pw-maroon'}">${readPercent}%</div>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-3 mb-4 shadow-inner">
                        <div class="${readPercent === 100 ? 'bg-green-500' : 'bg-pw-maroon'} h-3 rounded-full" style="width: ${readPercent}%"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="flex items-center gap-3 bg-red-50 p-3 rounded-xl border border-red-100">
                            <div class="w-8 h-8 rounded-full bg-white text-pw-maroon flex items-center justify-center shadow-sm"><i class="fas fa-bell"></i></div>
                            <div><div class="text-[14px] font-black text-pw-maroon">${myUnread}</div><div class="text-[9px] font-bold text-gray-600 uppercase">Unread</div></div>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200">
                            <div class="w-8 h-8 rounded-full bg-white text-gray-600 flex items-center justify-center shadow-sm"><i class="fas fa-file-alt"></i></div>
                            <div><div class="text-[14px] font-black text-gray-800">${activePosts}</div><div class="text-[9px] font-bold text-gray-600 uppercase">Posts</div></div>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200">
                            <div class="w-8 h-8 rounded-full bg-white text-gray-600 flex items-center justify-center shadow-sm"><i class="fas fa-check-circle"></i></div>
                            <div><div class="text-[14px] font-black text-gray-800">${myAcks}</div><div class="text-[9px] font-bold text-gray-600 uppercase">Read</div></div>
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-t border-gray-100 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wide">Achievement</span>
                        <span class="text-[12px] font-black ${achievementColor}">${achievementLevel}</span>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER: Announcement
        // ============================================================
        function renderAnnouncement(a) {
            const hasAcknowledged = a.acknowledgements.includes(state.user.name);
            const myProof = a.proofs.find(p => p.student === state.user.name);
            
            const authorUser = state.users.find(u => u.name === a.author);
            const authorAvatar = authorUser && authorUser.avatar ? `<img src="${authorUser.avatar}" class="w-full h-full object-cover rounded-full">` : a.author.charAt(0);
            
            const isExpanded = state.expandedPosts.includes(a.id);
            const isLong = a.content.length > 120;
            const displayText = (isExpanded || !isLong) ? a.content : a.content.substring(0, 120) + '...';

            let categoryColor = 'bg-blue-100 text-blue-700 border-blue-200';
            let categoryIcon = 'fas fa-book';
            if(a.category === 'Events') { categoryColor = 'bg-purple-100 text-purple-700 border-purple-200'; categoryIcon = 'fas fa-calendar-alt'; }
            else if(a.category === 'Deadlines') { categoryColor = 'bg-red-100 text-red-700 border-red-200'; categoryIcon = 'fas fa-exclamation-circle'; }
            else if(a.category === 'Exam') { categoryColor = 'bg-yellow-100 text-yellow-700 border-yellow-200'; categoryIcon = 'fas fa-file-alt'; }
            else if(a.category === 'Announcement') { categoryColor = 'bg-green-100 text-green-700 border-green-200'; categoryIcon = 'fas fa-bullhorn'; }

            return `
                <div class="bg-white p-5 rounded-[20px] shadow-sm border border-gray-200 relative overflow-hidden">
                    ${hasAcknowledged ? '<div class="absolute top-0 right-0 w-20 h-20 bg-green-50 rounded-bl-[40px] -z-10 opacity-70"></div>' : ''}
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[9px] font-black px-2.5 py-1.5 rounded-lg uppercase tracking-widest border ${categoryColor}"><i class="${categoryIcon} mr-1"></i> ${a.category}</span>
                        <span class="text-[10px] font-bold text-gray-400 bg-gray-50 px-2 py-1 rounded-md border border-gray-100"><i class="far fa-clock mr-1"></i>${a.date || 'Just now'}</span>
                    </div>
                    <h3 class="font-black text-[16px] text-gray-900 leading-tight mb-1" onclick="toggleExpand(${a.id})">${a.title}</h3>
                    <div class="flex items-center mt-2 mb-4">
                        <div class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-[10px] font-bold mr-2 border border-gray-300">
                            ${authorAvatar}
                        </div>
                        <p class="text-[11px] text-gray-600 font-bold">${a.author}</p>
                    </div>
                    
                    ${a.image ? `<div class="mb-4 rounded-xl overflow-hidden border border-gray-200 shadow-sm"><img src="${a.image}" onclick="viewImage('${a.image}')" class="w-full h-48 object-cover cursor-pointer hover:opacity-90"></div>` : ''}
                    
                    <div class="text-[13px] text-gray-700 mb-5 leading-relaxed bg-gray-50 p-4 rounded-xl border border-gray-200 font-medium" onclick="toggleExpand(${a.id})">
                        ${displayText}
                        ${isLong ? `<button class="text-pw-maroon font-black ml-1 hover:underline focus:outline-none">${isExpanded ? 'Show less' : 'Read more'}</button>` : ''}
                    </div>
                    
                    <div class="pt-1">
                        <div class="flex gap-2">
                            <button onclick="toggleAcknowledge(${a.id})" class="flex-[1] text-[11px] py-3 rounded-xl font-black border flex justify-center items-center ${hasAcknowledged ? 'bg-green-100 text-green-700 border-green-300 shadow-inner' : 'bg-pw-maroon text-white border-pw-maroon hover:bg-red-900 shadow-md'}">
                                <i class="fas ${hasAcknowledged ? 'fa-check-double text-green-600' : 'fa-check'} mr-2 text-sm"></i> ${hasAcknowledged ? 'Acknowledged' : 'Mark as Read'}
                            </button>
                            ${a.category === 'Events' ? `
                                ${!myProof ? `<button onclick="openUpload(${a.id})" class="flex-[1] bg-white text-pw-maroon border-2 border-pw-maroon text-[11px] py-3 rounded-xl font-black shadow-sm hover:bg-red-50"><i class="fas fa-camera mr-1"></i> Send Proof</button>` : 
                                `<div class="flex-[1] text-[10px] flex items-center justify-center font-black border rounded-xl shadow-inner ${myProof.status==='Verified'?'bg-green-50 text-green-700 border-green-200':'bg-orange-50 text-orange-600 border-orange-200'}">
                                    <i class="fas ${myProof.status==='Verified'?'fa-shield-check':'fa-hourglass-half'} mr-1"></i> ${myProof.status}
                                </div>`}
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER: Profile
        // ============================================================
        function renderProfile() {
            const user = state.user;
            const isEditing = state.editingProfile;
            
            return `
                <div class="p-4 pb-8">
                    <div class="bg-white rounded-[24px] shadow-md border border-gray-200 overflow-hidden relative">
                        <div class="h-32 bg-pw-maroon relative flex items-center justify-center overflow-hidden">
                            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 16px 16px;"></div>
                            <div class="absolute -bottom-10 -right-10 text-white/10 text-8xl"><i class="fas fa-user-graduate"></i></div>
                            <div class="absolute top-2 right-2 bg-white/20 backdrop-blur-sm text-white px-3 py-1 rounded-full text-[10px] font-black flex items-center gap-1">
                                <i class="fas fa-star"></i>
                                <span>${getStudentRank()}</span>
                            </div>
                        </div>
                        
                        <div class="relative px-6 pb-6 text-center -mt-14 z-10">
                            <div class="relative w-28 h-28 mx-auto">
                                <div class="w-full h-full bg-white rounded-full flex items-center justify-center text-5xl text-pw-maroon font-black border-[6px] border-white shadow-lg overflow-hidden">
                                    ${user.avatar ? `<img src="${user.avatar}" class="w-full h-full object-cover">` : user.name.charAt(0)}
                                </div>
                                <label class="absolute bottom-0 right-0 bg-pw-maroon text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow-md cursor-pointer hover:bg-red-900 z-20">
                                    <i class="fas fa-camera text-[12px]"></i>
                                    <input type="file" onchange="handleAvatarUpdate(event)" class="hidden" accept="image/*">
                                </label>
                            </div>
                            
                            <h2 class="font-black text-[20px] text-gray-900 leading-tight mt-3 tracking-tight">${user.name}</h2>
                            
                            <div class="flex justify-center mt-2">
                                <span class="text-[10px] font-black text-pw-maroon uppercase tracking-widest bg-red-50 px-3 py-1.5 rounded-full border border-red-100 flex items-center shadow-sm">
                                    <i class="fas fa-user-graduate mr-1.5"></i>
                                    ${user.position || 'Student'}
                                </span>
                            </div>
                            
                            <div class="mt-3 flex justify-center gap-2">
                                <span class="text-[9px] font-black px-2.5 py-1 rounded-full bg-green-100 text-green-700 border border-green-200">
                                    <i class="fas fa-check-circle mr-1"></i> ${getReadCount()} read
                                </span>
                                <span class="text-[9px] font-black px-2.5 py-1 rounded-full bg-blue-100 text-blue-700 border border-blue-200">
                                    <i class="fas fa-calendar mr-1"></i> ${getStudentRank()}
                                </span>
                            </div>
                        </div>
                        
                        <div class="px-6 pb-6 space-y-4">
                            <h3 class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 border-b border-gray-100 pb-2 flex items-center">
                                <i class="fas fa-id-badge mr-2"></i> Student Information
                            </h3>
                            
                            <div class="space-y-3">
                                <div class="flex items-center gap-4 bg-gray-50 p-3.5 rounded-2xl border border-gray-200">
                                    <div class="w-10 h-10 rounded-full bg-white text-gray-500 flex items-center justify-center shadow-sm border border-gray-100"><i class="fas fa-user"></i></div>
                                    <div class="flex-1">
                                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Full Name</label>
                                        <div class="text-[13px] text-gray-900 font-bold mt-0.5 truncate">${user.name}</div>
                                    </div>
                                </div>
                                
                                <div class="flex items-center gap-4 bg-gray-50 p-3.5 rounded-2xl border border-gray-200">
                                    <div class="w-10 h-10 rounded-full bg-white text-gray-500 flex items-center justify-center shadow-sm border border-gray-100"><i class="fas fa-envelope"></i></div>
                                    <div class="flex-1">
                                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Email Address</label>
                                        <div class="text-[13px] text-gray-900 font-bold mt-0.5 truncate">${user.email}</div>
                                    </div>
                                </div>
                                
                                <div class="flex items-center gap-4 bg-gray-50 p-3.5 rounded-2xl border border-gray-200">
                                    <div class="w-10 h-10 rounded-full bg-white text-gray-500 flex items-center justify-center shadow-sm border border-gray-100"><i class="fas fa-id-card"></i></div>
                                    <div class="flex-1">
                                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">LRN Number</label>
                                        ${isEditing ? `
                                            ${!user.lrnChanged ? 
                                                `<input type="number" id="e-lrn" value="${user.lrn}" class="w-full mt-1 p-2 bg-white rounded-lg border-2 border-pw-maroon text-[13px] font-bold text-gray-900 focus:outline-none shadow-sm">
                                                <div class="text-orange-600 text-[9px] font-black mt-1.5 flex items-start leading-tight bg-orange-50 p-1.5 rounded border border-orange-100"><i class="fas fa-exclamation-triangle mt-0.5 mr-1"></i> LRN can only be changed ONCE. Ensure it is correct.</div>`
                                                : `<div class="text-[13px] text-gray-500 font-bold mt-0.5 flex items-center gap-2">${user.lrn} <span class="bg-gray-200 text-gray-600 text-[9px] px-1.5 py-0.5 rounded uppercase border border-gray-300"><i class="fas fa-lock text-[8px] mr-1"></i>Locked</span></div>`
                                            }
                                        ` : `<div class="text-[13px] text-gray-900 font-bold mt-0.5">${user.lrn}</div>`}
                                    </div>
                                </div>

                                <div class="flex items-center gap-4 bg-gray-50 p-3.5 rounded-2xl border border-gray-200">
                                    <div class="w-10 h-10 rounded-full bg-white text-gray-500 flex items-center justify-center shadow-sm border border-gray-100"><i class="fas fa-birthday-cake"></i></div>
                                    <div class="flex-1">
                                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Birth Date</label>
                                        ${isEditing ? `
                                            <input type="date" id="e-bday" value="${user.bday}" class="w-full mt-1 p-2 bg-white rounded-lg border-2 border-pw-maroon text-[13px] font-bold text-gray-900 focus:outline-none shadow-sm">
                                        ` : `<div class="text-[13px] text-gray-900 font-bold mt-0.5">${user.bday === 'N/A' ? 'Not Set' : user.bday}</div>`}
                                    </div>
                                </div>
                                
                                <div class="flex items-center gap-4 bg-gray-50 p-3.5 rounded-2xl border border-gray-200">
                                    <div class="w-10 h-10 rounded-full bg-white text-gray-500 flex items-center justify-center shadow-sm border border-gray-100"><i class="fas fa-clock"></i></div>
                                    <div class="flex-1">
                                        <label class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Account Created</label>
                                        <div class="text-[13px] text-gray-900 font-bold mt-0.5">${user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'N/A'}</div>
                                    </div>
                                </div>
                            </div>
                            
                            <button onclick="${isEditing ? 'saveProfile()' : 'state.editingProfile=true; render()'}" class="mt-6 w-full ${isEditing ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-900 hover:bg-black'} text-white py-4 rounded-xl font-black text-[13px] shadow-md flex justify-center items-center border border-transparent transition-colors">
                                <i class="fas ${isEditing ? 'fa-save' : 'fa-user-edit'} mr-2"></i> ${isEditing ? 'Save Profile Details' : 'Edit Profile Details'}
                            </button>
                            
                            ${isEditing ? `
                                <button onclick="state.editingProfile=false; render()" class="mt-2 w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-black text-[12px] hover:bg-gray-200 border border-gray-200">
                                    Cancel Editing
                                </button>
                            ` : ''}
                            
                            <div class="mt-4 p-4 bg-gradient-to-r from-red-50 to-red-100 rounded-2xl border border-red-200">
                                <h4 class="text-[11px] font-black text-pw-maroon uppercase tracking-widest flex items-center"><i class="fas fa-chart-simple mr-2"></i> Your Stats</h4>
                                <div class="grid grid-cols-3 gap-2 mt-2">
                                    <div class="text-center bg-white/50 rounded-xl p-2">
                                        <div class="text-[16px] font-black text-pw-maroon">${getReadCount()}</div>
                                        <div class="text-[8px] font-bold text-gray-600 uppercase">Read</div>
                                    </div>
                                    <div class="text-center bg-white/50 rounded-xl p-2">
                                        <div class="text-[16px] font-black text-pw-maroon">${state.announcements.length}</div>
                                        <div class="text-[8px] font-bold text-gray-600 uppercase">Posts</div>
                                    </div>
                                    <div class="text-center bg-white/50 rounded-xl p-2">
                                        <div class="text-[16px] font-black text-pw-maroon">${getUnreadEvents().length}</div>
                                        <div class="text-[8px] font-bold text-gray-600 uppercase">Unread</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER: Upload Modal
        // ============================================================
        function renderUploadModal() {
            return `
                <div class="fixed inset-0 bg-black/70 z-[70] flex items-center justify-center p-4 backdrop-blur-sm modal-overlay" onclick="closeUploadModal(event)">
                    <div class="bg-white w-full max-w-xs p-6 rounded-[24px] shadow-2xl text-center border border-gray-200 modal-content" onclick="event.stopPropagation()">
                        <div class="w-14 h-14 bg-red-50 text-pw-maroon rounded-full flex items-center justify-center text-2xl mx-auto mb-4 border border-red-100"><i class="fas fa-cloud-upload-alt"></i></div>
                        <h3 class="font-black text-[16px] text-gray-900 mb-1">Submit Proof</h3>
                        <p class="text-[11px] text-gray-500 mb-5 font-bold">Attach an image for teacher verification.</p>
                        
                        <label class="block w-full border-2 border-dashed border-gray-300 rounded-xl p-8 cursor-pointer hover:border-pw-maroon hover:bg-red-50 bg-gray-50 mb-5 group relative overflow-hidden">
                            ${state.tempImage ? `<img src="${state.tempImage}" class="absolute inset-0 w-full h-full object-cover opacity-60"><div class="relative z-10 text-pw-maroon font-black text-sm bg-white/90 p-2 rounded-lg inline-block border border-red-100"><i class="fas fa-check-circle mr-1"></i> Image Selected</div>` : `<div class="text-gray-400 group-hover:text-pw-maroon"><i class="fas fa-camera text-3xl mb-3 block"></i><span class="text-[11px] font-black uppercase tracking-wider">Tap to Browse</span></div>`}
                            <input type="file" id="f-input" onchange="handleFile(event)" class="hidden" accept="image/*">
                        </label>
                        
                        <div class="flex gap-3">
                            <button onclick="closeUploadModal()" class="flex-1 bg-gray-100 text-gray-700 py-3.5 rounded-xl text-[12px] font-black hover:bg-gray-200 border border-gray-200">Cancel</button>
                            <button onclick="submitUpload()" class="flex-[1.5] bg-pw-maroon text-white py-3.5 rounded-xl text-[12px] font-black shadow-md hover:bg-red-900 ${!state.tempImage ? 'opacity-50 cursor-not-allowed' : ''}" ${!state.tempImage ? 'disabled' : ''}>Submit Proof</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER: Image Preview
        // ============================================================
        function renderImagePreview() {
            return `
                <div class="fixed inset-0 bg-black/95 z-[80] flex items-center justify-center p-4 modal-overlay" onclick="state.imagePreviewId=null; render()">
                    <button class="absolute top-6 right-6 text-white text-2xl w-12 h-12 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/40"><i class="fas fa-times"></i></button>
                    <img src="${state.imagePreviewId}" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl border-2 border-gray-700" onclick="event.stopPropagation()">
                </div>
            `;
        }

        // ============================================================
        // RENDER: Logout Modal
        // ============================================================
        function renderLogoutModal() {
            return `
                <div class="fixed inset-0 bg-black/70 z-[70] flex items-center justify-center p-4 backdrop-blur-sm modal-overlay" onclick="closeLogoutModal(event)">
                    <div class="bg-white w-full max-w-xs rounded-[24px] p-6 shadow-2xl text-center border border-gray-200 modal-content" onclick="event.stopPropagation()">
                        <div class="w-16 h-16 bg-red-50 text-pw-maroon rounded-full flex items-center justify-center text-3xl mx-auto mb-4 border border-red-100"><i class="fas fa-sign-out-alt ml-1"></i></div>
                        <h3 class="font-black text-[18px] text-gray-900 mb-2">Sign Out?</h3>
                        <p class="text-[12px] text-gray-500 mb-6 font-bold px-2">Are you sure you want to log out of the student portal?</p>
                        <div class="flex gap-3">
                            <button onclick="closeLogoutModal()" class="flex-1 py-3.5 text-[12px] font-black text-gray-700 bg-gray-100 rounded-xl hover:bg-gray-200 border border-gray-200">Cancel</button>
                            <button onclick="confirmLogout()" class="flex-1 py-3.5 text-[12px] font-black text-white bg-pw-maroon rounded-xl shadow-md hover:bg-red-900">Sign Out</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER: Loading
        // ============================================================
        function renderLoading() {
            return `
                <div class="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center backdrop-blur-sm modal-overlay">
                    <div class="bg-white rounded-2xl p-6 shadow-2xl flex items-center gap-4 border border-gray-200">
                        <div class="spinner" style="border-color: #800000; border-top-color: transparent;"></div>
                        <span class="text-sm font-black text-gray-800">Loading...</span>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function getUnreadEvents() {
            if (!state.user) return [];
            return state.announcements.filter(a => !a.acknowledgements.includes(state.user.name));
        }

        function getReadCount() {
            let count = 0;
            state.announcements.forEach(a => {
                if (a.acknowledgements.includes(state.user.name)) count++;
            });
            return count;
        }

        function getStudentRank() {
            const readCount = getReadCount();
            const total = state.announcements.length;
            if (total === 0) return '🌟 New';
            const percentage = Math.round((readCount / total) * 100);
            if (percentage >= 80) return '🏆 Scholar';
            if (percentage >= 50) return '📚 Learner';
            if (percentage >= 20) return '📖 Reader';
            return '🌟 New';
        }

        function closeDropdowns(e) {
            if (state.showNotifications && !e.target.closest('#noti-btn') && !e.target.closest('#noti-drop')) {
                state.showNotifications = false;
                render();
            }
        }

        // ============================================================
        // ACTIONS
        // ============================================================
        function changeView(view) {
            state.view = view;
            state.showNotifications = false;
            render();
        }

        function toggleNotifications() {
            state.showNotifications = !state.showNotifications;
            render();
        }

        function toggleExpand(id) {
            if (state.expandedPosts.includes(id)) {
                state.expandedPosts = state.expandedPosts.filter(x => x !== id);
            } else {
                state.expandedPosts.push(id);
            }
            render();
        }

        async function saveProfile() {
            const lrnInput = document.getElementById('e-lrn');
            const bdayInput = document.getElementById('e-bday');
            const updates = {};
            
            if (lrnInput && lrnInput.value && lrnInput.value !== state.user.lrn) {
                if (!state.user.lrnChanged) {
                    updates.lrn = lrnInput.value;
                }
            }
            
            if (bdayInput && bdayInput.value) {
                updates.bday = bdayInput.value;
            }
            
            if (Object.keys(updates).length === 0) {
                state.editingProfile = false;
                render();
                return showToast('No changes made', 'success');
            }
            
            try {
                state.loading = true;
                render();
                const updated = await apiCall(`/users/${state.user.id}`, {
                    method: 'PUT',
                    body: updates
                });
                state.user = updated;
                state.editingProfile = false;
                await loadData();
                state.loading = false;
                render();
                showToast('Profile updated successfully!', 'success');
            } catch (e) {
                state.loading = false;
                render();
                showToast(e.message, 'error');
            }
        }

        async function handleAvatarUpdate(e) {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = async (ev) => {
                try {
                    state.loading = true;
                    render();
                    await apiCall(`/users/${state.user.id}`, {
                        method: 'PUT',
                        body: { avatar: ev.target.result }
                    });
                    state.user.avatar = ev.target.result;
                    await loadData();
                    state.loading = false;
                    render();
                    showToast('Profile picture updated', 'success');
                } catch (err) {
                    state.loading = false;
                    render();
                    showToast(err.message, 'error');
                }
            };
            r.readAsDataURL(file);
        }

        async function toggleAcknowledge(id) {
            try {
                state.loading = true;
                render();
                await apiCall(`/announcements/${id}/acknowledge`, {
                    method: 'POST',
                    body: { userId: state.user.id }
                });
                await loadData();
                state.loading = false;
                render();
                showToast('Post marked as read', 'success');
            } catch (e) {
                state.loading = false;
                render();
                showToast(e.message, 'error');
            }
        }

        function openUpload(id) {
            state.uploadModalId = id;
            render();
        }

        function closeUploadModal(e) {
            if (e && e.target !== e.currentTarget) return;
            state.uploadModalId = null;
            state.tempImage = null;
            render();
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => { state.tempImage = ev.target.result; render(); };
            r.readAsDataURL(file);
        }

        async function submitUpload() {
            if (!state.tempImage) return;
            try {
                state.loading = true;
                render();
                await apiCall(`/announcements/${state.uploadModalId}/proof`, {
                    method: 'POST',
                    body: { userId: state.user.id, image: state.tempImage }
                });
                state.uploadModalId = null;
                state.tempImage = null;
                await loadData();
                state.loading = false;
                render();
                showToast('Proof submitted!', 'success');
            } catch (e) {
                state.loading = false;
                render();
                showToast(e.message, 'error');
            }
        }

        function viewImage(src) {
            state.imagePreviewId = src;
            render();
        }

        function closeLogoutModal(e) {
            if (e && e.target !== e.currentTarget) return;
            state.showLogoutModal = false;
            render();
        }

        function confirmLogout() {
            sessionStorage.removeItem('user');
            sessionStorage.removeItem('mode');
            window.location.href = '/';
        }

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            const user = checkSession();
            if (!user) return;
            state.user = user;
            await loadData();
            render();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (state.uploadModalId) { state.uploadModalId = null; state.tempImage = null; render(); }
                if (state.imagePreviewId) { state.imagePreviewId = null; render(); }
                if (state.showLogoutModal) { state.showLogoutModal = false; render(); }
                if (state.showNotifications) { state.showNotifications = false; render(); }
            }
        });

        init();
    </script>

</body>
</html>
